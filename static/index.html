<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autonomous Researcher</title>
  <style>
    :root {
      --color-bg: #0f1115;
      --color-surface: #1a1d24;
      --color-border: #2a2f3a;
      --color-text: #e6e9ef;
      --color-muted: #9aa3b2;
      --color-accent: #5b9dff;
      --color-error: #ff6b6b;
      --color-success: #4ade80;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --radius: 10px;
      --font-sans: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--color-bg); color: var(--color-text);
      font-family: var(--font-sans); line-height: 1.5;
    }
    main { max-width: 820px; margin: 0 auto; padding: var(--space-lg); }
    h1 { font-size: 1.5rem; margin: 0 0 var(--space-sm); }
    .sub { color: var(--color-muted); margin: 0 0 var(--space-lg); font-size: 0.9rem; }
    form { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); }
    input[type="text"] {
      flex: 1; padding: var(--space-md); border-radius: var(--radius);
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text); font-size: 1rem;
    }
    input[type="text"]:focus { outline: 2px solid var(--color-accent); border-color: transparent; }
    button {
      padding: var(--space-md) var(--space-lg); border-radius: var(--radius);
      border: none; background: var(--color-accent); color: #0b1220;
      font-weight: 600; font-size: 1rem; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { min-height: 1.2em; margin-bottom: var(--space-md); font-size: 0.9rem; }
    #status.loading { color: var(--color-accent); }
    #status.error { color: var(--color-error); }
    #status.success { color: var(--color-success); }
    .spinner {
      display: inline-block; width: 12px; height: 12px; margin-right: var(--space-sm);
      border: 2px solid var(--color-accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #report {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius); padding: var(--space-lg); display: none;
    }
    #report.visible { display: block; }
    #report a { color: var(--color-accent); }
    #report h1, #report h2, #report h3 { margin: var(--space-md) 0 var(--space-sm); }
    #report code {
      font-family: var(--font-mono); background: var(--color-bg);
      padding: 2px 5px; border-radius: 4px;
    }
    #report ul { padding-left: var(--space-lg); }
    #steps {
      display: none; flex-wrap: wrap; gap: 6px; margin-bottom: var(--space-md);
      font-size: 0.8rem;
    }
    #steps.visible { display: flex; }
    .step {
      padding: 4px 10px; border-radius: 999px; border: 1px solid var(--color-border);
      color: var(--color-muted); background: var(--color-surface);
    }
    .step.running { color: var(--color-accent); border-color: var(--color-accent); }
    .step.done { color: var(--color-success); border-color: var(--color-success); }
    .step.failed { color: var(--color-error); border-color: var(--color-error); }
  </style>
</head>
<body>
  <main>
    <h1>🔎 Autonomous Researcher</h1>
    <p class="sub">Plan A: SearXNG → ingest → verify. <a href="/monitor" style="color:var(--color-accent)">Live monitor</a></p>
    <form id="form">
      <input id="question" type="text" placeholder="What is the latest stable Python release?"
             autocomplete="off" required minlength="3" maxlength="2000" />
      <button id="submit" type="submit">Research</button>
    </form>
    <div id="steps" aria-label="Pipeline progress"></div>
    <div id="status" role="status" aria-live="polite"></div>
    <article id="report"></article>
  </main>
  <script>
    const form = document.getElementById("form");
    const input = document.getElementById("question");
    const button = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const reportEl = document.getElementById("report");
    const stepsEl = document.getElementById("steps");
    const PLAN_STEPS = ["plan", "search", "ingest", "synthesize", "verify", "critique", "finalize"];
    const stepState = Object.fromEntries(PLAN_STEPS.map(s => [s, "pending"]));

    function initSteps() {
      stepsEl.innerHTML = "";
      for (const name of PLAN_STEPS) {
        stepState[name] = "pending";
        const el = document.createElement("span");
        el.className = "step";
        el.id = "step-" + name;
        el.textContent = name;
        stepsEl.appendChild(el);
      }
      stepsEl.classList.add("visible");
    }

    function updateStep(name, state) {
      if (!PLAN_STEPS.includes(name)) return;
      if (state === "running" && stepState[name] === "done") return;
      stepState[name] = state;
      const el = document.getElementById("step-" + name);
      if (el) el.className = "step " + state;
    }

    function handleStreamEvent(ev) {
      if (ev.type === "step" && ev.step) {
        const st = ev.status;
        if (st === "running" || st === "start" || st === "phase") updateStep(ev.step, "running");
        else if (st === "done") updateStep(ev.step, "done");
        else if (st === "failed") updateStep(ev.step, "failed");
        if (ev.detail) setStatus("loading", `${ev.step}: ${ev.detail}`, true);
      }
    }

    async function streamResearch(question) {
      const resp = await fetch("/api/research/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.detail || `Request failed (HTTP ${resp.status})`);
      }
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split("\n\n");
        buf = parts.pop() || "";
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data: ")) continue;
          const ev = JSON.parse(line.slice(6));
          handleStreamEvent(ev);
          if (ev.type === "complete") return ev.report || "";
          if (ev.type === "error") throw new Error(ev.detail || "Research failed");
        }
      }
      throw new Error("Stream ended without a report");
    }

    function setStatus(kind, text, withSpinner = false) {
      statusEl.className = kind;
      statusEl.innerHTML = (withSpinner ? '<span class="spinner"></span>' : "") +
        text.replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
    }

    // Minimal, XSS-safe markdown -> HTML: escape first, then format a known subset.
    function renderMarkdown(md) {
      let html = md.replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      const lines = html.split("\n");
      const out = [];
      let inList = false;
      for (const line of lines) {
        const h = line.match(/^(#{1,3})\s+(.*)$/);
        const li = line.match(/^\s*[-*]\s+(.*)$/);
        if (h) {
          if (inList) { out.push("</ul>"); inList = false; }
          out.push(`<h${h[1].length}>${h[2]}</h${h[1].length}>`);
        } else if (li) {
          if (!inList) { out.push("<ul>"); inList = true; }
          out.push(`<li>${li[1]}</li>`);
        } else if (line.trim() === "") {
          if (inList) { out.push("</ul>"); inList = false; }
        } else {
          if (inList) { out.push("</ul>"); inList = false; }
          out.push(`<p>${line}</p>`);
        }
      }
      if (inList) out.push("</ul>");
      return out.join("\n");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (question.length < 3) { setStatus("error", "Please enter a longer question."); return; }

      button.disabled = true;
      reportEl.classList.remove("visible");
      reportEl.innerHTML = "";
      initSteps();
      setStatus("loading", "Plan A research… streaming step progress.", true);

      try {
        const report = await streamResearch(question);
        setStatus("success", "Done.");
        reportEl.innerHTML = renderMarkdown(report || "");
        reportEl.classList.add("visible");
      } catch (err) {
        setStatus("error", `Error: ${err.message}`);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
